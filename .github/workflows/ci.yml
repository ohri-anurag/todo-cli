name: CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Clone the repo
        uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run CI using docker
        run: |
          docker pull ghcr.io/ohri-anurag/ci:latest
          docker run ghcr.io/ohri-anurag/ci:latest bash -c 'cabal build && cabal test'
